<app-loading [visible]="isLoading()" />

@if (!isLoading() && errorMessage()) {
<p class="error">{{ errorMessage() }}</p>
}

@if (!isLoading() && !errorMessage() && rows().length > 0) {
<table>
    <thead>
        <tr>
            @for (col of visibleColumns; track col) {
            <th>{{ col }}</th>
            }
        </tr>
    </thead>
    <tbody>
        @for (row of rows(); track $index) {
        <tr>
            @for (col of visibleColumns; track col) {
            <td>{{ row[col] }}</td>
            }
        </tr>
        }
    </tbody>
</table>
}
