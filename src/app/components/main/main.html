<!-- Zeigt den Loading-Screen, solange geladen wird -->
<app-loading [visible]="isLoading()" />

<!-- Zeige Fehlermeldung oder Hinweis, wenn vorhanden und nicht geladen wird -->
@if (!isLoading() && errorMessage()) {
<p class="error">{{ errorMessage() }}</p>
}

<!-- Zeige die Tabelle nur, wenn Daten vorhanden sind und kein Fehler vorliegt -->
@if (!isLoading() && !errorMessage() && rows().length > 0) {
<table>
    <thead>
        <tr>
            @for (col of columns(); track col) {
            <th>{{ col }}</th>
            }
        </tr>
    </thead>
    <tbody>
        @for (row of rows(); track $index) {
        <tr>
            @for (col of columns(); track col) {
            <td>{{ row[col] }}</td>
            }
        </tr>
        }
    </tbody>
</table>
}
